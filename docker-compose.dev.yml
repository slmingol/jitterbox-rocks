version: '3.8'

services:
  # Backend API Service (Development)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: music-trivia-game-backend:${VERSION:-1.0.0}-dev
    container_name: music-trivia-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app/server
      - ./data:/app/data  # SQLite database file
      - ./uploads:/app/uploads
      - /app/node_modules
    networks:
      - music-trivia-network
    command: npm run server

  # Frontend Service (Development)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    image: music-trivia-game-frontend:${VERSION:-1.0.0}-dev
    container_name: music-trivia-frontend-dev
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - music-trivia-network
    stdin_open: true
    tty: true

networks:
  music-trivia-network:
    driver: bridge
