services:
  # Backend API Service
  backend:
    image: ghcr.io/slmingol/jitterbox-rocks-backend:latest
    container_name: jitterbox-rocks-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5431:5000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    networks:
      - jitterbox-rocks-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Service
  frontend:
    image: ghcr.io/slmingol/jitterbox-rocks-frontend:latest
    container_name: jitterbox-rocks-frontend
    restart: unless-stopped
    ports:
      - "5432:80"
    depends_on:
      - backend
    networks:
      - jitterbox-rocks-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  jitterbox-rocks-network:
    driver: bridge
