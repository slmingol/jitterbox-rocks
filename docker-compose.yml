services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: roadie-rumble-backend:${VERSION:-1.0.0}
    container_name: roadie-rumble-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data  # SQLite database file
      - ./uploads:/app/uploads
    networks:
      - roadie-rumble-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: roadie-rumble-frontend:${VERSION:-1.0.0}
    container_name: roadie-rumble-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - roadie-rumble-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  roadie-rumble-network:
    driver: bridge
