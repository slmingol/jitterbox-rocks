services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: jitterbox-rocks-backend:${VERSION:-1.0.0}
    container_name: jitterbox-rocks-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5431:5000"
    volumes:
      - ./data:/app/data  # SQLite database file
      - ./uploads:/app/uploads
    networks:
      - jitterbox-rocks-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: jitterbox-rocks-frontend:${VERSION:-1.0.0}
    container_name: jitterbox-rocks-frontend
    restart: unless-stopped
    ports:
      - "5432:80"
    depends_on:
      - backend
    networks:
      - jitterbox-rocks-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  jitterbox-rocks-network:
    driver: bridge
